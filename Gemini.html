<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteo AI - Londýn</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            background-color: #28a745; /* Iná farba pre Londýn */
            color: white;
            border: none;
            border-radius: 8px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #218838;
        }
        #result {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
            min-height: 25px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🌤️ Meteo AI - London City (EGLC)</h2>
        <button id="ask-btn">Spýtať sa AI na počasie</button>
        <div id="result"></div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // --- TU VLOŽ SVOJ API KĽÚČ ---
        const API_KEY = "AIzaSyDGl2YSqK__Z6okCDYF3NEg1PmytWrLT54"; 
        // ---------------------------

        const btn = document.getElementById('ask-btn');
        const resultDiv = document.getElementById('result');

        btn.addEventListener('click', async () => {
            resultDiv.innerText = "Analyzujem dáta... 🤖";
            
            try {
                const genAI = new GoogleGenerativeAI(API_KEY);
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

                // Zmenený prompt pre Londýn
                const prompt = `Analyzuj aktuálnu predpoveď (MetNet-3) pre letisko London City (EGLC) na dnešný deň. 
                Aká bude maximálna teplota? Odpovedz krátkou vetou v slovenčine.`;

                const result = await model.generateContent(prompt);
                const response = await result.response;
                resultDiv.innerText = response.text();
            } catch (error) {
                resultDiv.innerText = "Chyba: Nepodarilo sa spojiť s AI. Skontroluj API kľúč.";
                console.error(error);
            }
        });
    </script>
</body>
</html>
